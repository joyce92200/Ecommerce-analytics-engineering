version: 2

models:
  - name: dim_platform
    description: >
      One row per purchase platform. 2 rows. The platform_type column
      rolls platforms into broader categories (web, mobile) and is
      positioned for future enrichment.
    columns:
      - name: platform_name
        description: Primary key. Source platform name from stg_orders.
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['website', 'mobile app']

      - name: platform_type
        description: Broader platform category. Currently web or mobile.
        tests:
          - not_null
          - accepted_values:
              values: ['web', 'mobile']

  - name: dim_country
    description: >
      One row per country code. 193 rows = 191 from stg_country_lookup
      + 2 synthetic rows ('EU', 'AP') absorbing 18 orders that use region
      codes as country codes (README data quality decision).
    columns:
      - name: country_code
        description: Primary key. ISO country code or synthetic region code.
        tests:
          - not_null
          - unique

      - name: region
        description: Regional rollup. AMER, EMEA, APAC, LATAM, or Unclassified.
        tests:
          - not_null
          - accepted_values:
              values: ['AMER', 'EMEA', 'APAC', 'LATAM', 'Unclassified']

  - name: dim_product
    description: >
      One row per product. 8 rows. product_name is the canonical
      identifier; source product_id is an opaque 4-char hash not
      used downstream.
    columns:
      - name: product_name
        description: Primary key. Canonical product name from stg_orders.
        tests:
          - not_null
          - unique
          - accepted_values:
              values:
                - 'Apple Airpods Headphones'
                - '27in 4K gaming monitor'
                - 'Samsung Charging Cable Pack'
                - 'Samsung Webcam'
                - 'Macbook Air Laptop'
                - 'ThinkPad Laptop'
                - 'Apple iPhone'
                - 'bose soundsport headphones'

  - name: dim_users
    description: >
      One row per user. 87,625 users. THE METHODOLOGICALLY CRITICAL
      MODEL OF THE PROJECT: loyalty_status, marketing_channel, device,
      and first_purchase_aov are SNAPSHOTTED AT FIRST PURCHASE to avoid
      reverse causality. README documents this as the single most
      important methodological choice. Tie-breaker on order_id ensures
      deterministic results across runs.
    columns:
      - name: user_id
        description: Primary key.
        tests:
          - not_null
          - unique

      - name: first_purchase_ts
        description: Timestamp of the user's first order.
        tests:
          - not_null

      - name: first_purchase_month
        description: First-day-of-month truncation of first_purchase_ts. Used as cohort_month downstream.
        tests:
          - not_null

      - name: loyalty_at_first_purchase
        description: >
          Loyalty status (0/1) on the user's first order. NEVER updated
          after first purchase; this is the snapshot that powers the
          loyalty retention finding.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: marketing_channel_at_first_purchase
        description: >
          Marketing channel attributed to the user at first purchase.
          ~1,153 NULL after NaN coercion at silver.
        tests:
          - not_null:
              severity: warn
              config:
                meta:
                  known_issue: "~1,153 users with NULL channel at first purchase"
          - accepted_values:
              values: ['direct', 'email', 'affiliate', 'social media', 'unknown']

      - name: device_at_first_purchase
        description: >
          Account creation device captured at the user's first purchase.
          ~1,153 NULL after NaN coercion at silver.
        tests:
          - not_null:
              severity: warn
              config:
                meta:
                  known_issue: "~1,153 users with NULL device at first purchase"
          - accepted_values:
              values: ['desktop', 'mobile', 'unknown', 'tablet', 'tv']

      - name: first_purchase_aov
        description: >
          USD price of the user's first-purchase order. ~27 NULL where
          the user's first order had no recorded price.
        tests:
          - not_null:
              severity: warn
              config:
                meta:
                  known_issue: "27 users with NULL price on first purchase"

  - name: fct_orders
    description: >
      Order-grain fact table. 108,124 rows. Join point of the gold
      layer: stg_orders joined to dim_users for cohort attribution,
      with derived columns powering downstream marts.
      Methodological note: cohort_month derives from the USER's first
      purchase month (via dim_users), NOT this order's own month.
      This preserves the snapshot logic that prevents reverse-causality
      contamination in retention analyses.
    columns:
      - name: order_id
        description: Primary key. Identifier from source.
        tests:
          - not_null
          - unique

      - name: user_id
        description: Foreign key to dim_users.
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: purchase_ts
        description: Timestamp this order was placed.
        tests:
          - not_null

      - name: purchase_month
        description: First-day-of-month truncation of purchase_ts.
        tests:
          - not_null

      - name: cohort_month
        description: >
          User's first-purchase month, copied from dim_users. NOT this
          order's purchase month. Cohort assignment is fixed at user
          acquisition and never moves.
        tests:
          - not_null

      - name: months_since_acquisition
        description: >
          Months between cohort_month and purchase_month. Zero for the
          user's first purchase; increases for subsequent orders.
          Always non-negative (an order can't precede its own cohort).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                meta:
                  description: "No order may precede its user's cohort_month."

      - name: user_order_seq
        description: 1-based rank of this order within the user's purchase history. Tie-broken by order_id.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: is_first_purchase
        description: 1 if user_order_seq=1, else 0. Convenient flag for acquisition-order analyses.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: is_refunded
        description: Inherited from stg_orders. 1 if refund_ts populated, else 0.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: loyalty_status
        description: >
          Order-time loyalty status (NOT snapshotted - this is the value
          on this specific order). Compare to dim_users.loyalty_at_first_purchase
          for cohort-vs-current analyses.
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: product_name
        description: Foreign key to dim_product.
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_name

      - name: purchase_platform
        description: Foreign key to dim_platform.
        tests:
          - not_null
          - relationships:
              to: ref('dim_platform')
              field: platform_name

      - name: country_code
        description: >
          Foreign key to dim_country. dim_country includes 2 synthetic
          rows (EU, AP) absorbing region-codes-as-country-codes orders.
          ~154 orders have NULL country_code (source data quality issue
          not previously documented; surfaced by dbt migration).
        tests:
          - not_null:
              severity: warn
              config:
                meta:
                  known_issue: "~154 orders with NULL country_code; source data gap"
          - relationships:
              to: ref('dim_country')
              field: country_code

      - name: usd_price
        description: Inherited from stg_orders. ~33 NULL prices upstream.
        tests:
          - not_null:
              severity: warn
              config:
                meta:
                  known_issue: "~33 rows with NULL usd_price from source"
